<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg1: #0a1628;
    --bg2: #0d2044;
    --bg3: #112d5e;
    --accent: #4a90d9;
    --accent2: #6ab0f5;
    --glass: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.12);
    --text: rgba(255,255,255,0.9);
    --text-dim: rgba(255,255,255,0.5);
    --card-w: 428.5px;
    --card-h: 600px;
    --gap: 20px;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg1);
    color: var(--text);
  }

  /* ── Gradient background ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(29,78,160,0.55) 0%, transparent 70%),
      radial-gradient(ellipse 60% 80% at 80% 90%, rgba(10,40,100,0.7) 0%, transparent 70%),
      radial-gradient(ellipse 100% 100% at 50% 50%, #0d2044 0%, #0a1628 100%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.04;
    pointer-events: none;
  }

  /* ── Settings button ── */
  #settingsBtn {
    position: fixed; top: 20px; right: 20px; z-index: 100;
    width: 44px; height: 44px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(12px);
    transition: background 0.25s, transform 0.35s;
  }
  #settingsBtn:hover { background: rgba(255,255,255,0.12); transform: rotate(45deg); }
  #settingsBtn svg { width: 20px; height: 20px; fill: none; stroke: var(--accent2); stroke-width: 1.8; }

  /* ── Settings panel ── */
  #settingsPanel {
    position: fixed; top: 72px; right: 20px; z-index: 99;
    width: 320px;
    background: rgba(10,22,45,0.92);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    backdrop-filter: blur(20px);
    padding: 24px;
    display: none;
    flex-direction: column;
    gap: 18px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
  }
  #settingsPanel.open { display: flex; }

  .field label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--text-dim); }

  /* Mode toggle */
  .mode-toggle {
    display: flex;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    overflow: hidden;
  }
  .mode-btn {
    flex: 1; padding: 9px; text-align: center;
    font-size: 12px; letter-spacing: 0.04em;
    cursor: pointer;
    color: var(--text-dim);
    transition: background 0.2s, color 0.2s;
    user-select: none;
  }
  .mode-btn.active {
    background: var(--accent);
    color: #fff;
  }

  /* Apply button */
  #applyBtn {
    width: 100%;
    padding: 10px;
    background: linear-gradient(135deg, var(--accent), #2a6fc4);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }
  #applyBtn:hover { opacity: 0.9; transform: translateY(-1px); }
  #applyBtn:active { transform: translateY(0); }

  /* ── Status ── */
  #status {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    z-index: 90;
    background: rgba(10,22,45,0.85);
    border: 1px solid var(--glass-border);
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 12px;
    color: var(--text-dim);
    backdrop-filter: blur(12px);
    transition: opacity 0.4s;
    pointer-events: none;
  }

  /* ══════════════════════════════
     GRID MODE
  ══════════════════════════════ */
  #gridView {
    position: fixed; inset: 0; z-index: 1;
    display: none;
    flex-direction: column;
    justify-content: center;
    gap: 20px;
    padding: 28px 0;
    overflow: hidden;
  }
  #gridView.active { display: flex; }

  .grid-row {
    overflow: hidden;
    flex: 1;
    display: flex;
    align-items: center;
  }

  .grid-track {
    display: flex;
    align-items: center;
    gap: 20px;
    will-change: transform;
    flex-shrink: 0;
  }

  .grid-img-wrap {
    flex-shrink: 0;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 6px 28px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
  }
  .grid-img-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.5s;
    opacity: 0;
  }
  .grid-img-wrap img.loaded { opacity: 1; }

  /* ══════════════════════════════
     SLIDESHOW MODE
  ══════════════════════════════ */
  #slideshowView {
    position: fixed; inset: 0; z-index: 1;
    display: none;
    background: #000;
  }
  #slideshowView.active { display: block; }

  .slide {
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity 1.2s ease-in-out;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .slide.visible { opacity: 1; }
  .slide img {
    max-width: min(857px, 100vw);
    max-height: min(1200px, 100vh);
    width: auto;
    height: auto;
    object-fit: contain;
    display: block;
    border-radius: 4px;
  }
</style>
</head>
<body>

<!-- Settings Button -->
<button id="settingsBtn" title="Settings">
  <svg viewBox="0 0 24 24">
    <path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/>
    <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
  </svg>
</button>

<!-- Settings Panel -->
<div id="settingsPanel">
  <div class="field">
    <label>Google Drive Folder ID</label>
    <input id="folderInput" type="text" placeholder="1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs" />
  </div>
  <div class="field">
    <label>Google API Key</label>
    <input id="apiKeyInput" type="password" placeholder="AIza..." />
  </div>
  <div class="field">
    <label>Display Mode</label>
    <div class="mode-toggle">
      <div class="mode-btn active" data-mode="grid">Grid</div>
      <div class="mode-btn" data-mode="slideshow">Slideshow</div>
    </div>
  </div>
  <div class="field" id="speedField">
    <label>Grid Speed <span style="text-transform:none;font-size:10px;opacity:.6">(ช้า ←→ เร็ว)</span></label>
    <div style="display:flex;align-items:center;gap:10px;">
      <input id="speedRange" type="range" min="0.1" max="5" step="0.1" value="0.5"
        style="flex:1;accent-color:var(--accent);cursor:pointer;height:4px;" />
      <span id="speedVal" style="font-size:13px;color:var(--accent2);min-width:28px;text-align:right;">0.5</span>
    </div>
  </div>
  <div class="field">
    <label>Auto Refresh (นาที)</label>
    <input id="refreshInput" type="number" min="1" max="60" value="5" placeholder="5" />
  </div>
  <button id="applyBtn">Apply</button>
</div>

<!-- Status -->
<div id="status">กรุณากรอก Folder ID และ API Key ในเมนู Settings</div>

<!-- Grid View -->
<div id="gridView">
  <div class="grid-row"><div class="grid-track" id="gridTrack0"></div></div>
  <div class="grid-row"><div class="grid-track" id="gridTrack1"></div></div>
</div>

<!-- Slideshow View -->
<div id="slideshowView"></div>

<script>
// ── State ──────────────────────────────────────────────
let images = [];          // current image pool [{id, src}]
let mode = 'grid';
let refreshMinutes = 5;

// Grid
let gridAnimFrame = null;
let gridOffset = 0;       // shared offset for row 0
let gridTotalWidth = 0;   // width of ONE set (loop unit)
const IMG_W = 857;        // original image dimensions for aspect ratio
const IMG_H = 1200;
const GAP = 20;
let CARD_W = 0, CARD_H = 0; // calculated responsively
let SCROLL_SPEED = 0.5;  // mutable — controlled by slider

function calcCardDims() {
  const vpad = 56 + 20;  // padding*2 + row-gap
  const h = Math.floor((window.innerHeight - vpad) / 2);
  const w = Math.round(h * (IMG_W / IMG_H) * 10) / 10;
  return { w, h };
}

// Slideshow
let slideshowImages = []; // working shuffled pool for slideshow
let slideshowIdx = 0;
let slideshowTimer = null;

// Auto-refresh
let autoRefreshInterval = null;
let currentFolderId = '';
let currentApiKey = '';

// ── UI refs ────────────────────────────────────────────
const settingsBtn   = document.getElementById('settingsBtn');
const settingsPanel = document.getElementById('settingsPanel');
const folderInput   = document.getElementById('folderInput');
const apiKeyInput   = document.getElementById('apiKeyInput');
const refreshInput  = document.getElementById('refreshInput');
const applyBtn      = document.getElementById('applyBtn');
const speedRange    = document.getElementById('speedRange');
const speedVal      = document.getElementById('speedVal');
const statusEl      = document.getElementById('status');
const gridView      = document.getElementById('gridView');
const gridTracks    = [
  document.getElementById('gridTrack0'),
  document.getElementById('gridTrack1')
];
const slideshowView = document.getElementById('slideshowView');

// ── Load saved settings ────────────────────────────────
(function loadSaved() {
  const s = JSON.parse(localStorage.getItem('gallerySettings') || '{}');
  if (s.folderId)       folderInput.value  = s.folderId;
  if (s.apiKey)         apiKeyInput.value  = s.apiKey;
  if (s.refreshMinutes) refreshInput.value = s.refreshMinutes;
  if (s.scrollSpeed)   { speedRange.value = s.scrollSpeed; speedVal.textContent = s.scrollSpeed; SCROLL_SPEED = parseFloat(s.scrollSpeed); }
  if (s.mode) setMode(s.mode);
})();

// Speed slider live feedback
speedRange.addEventListener('input', () => {
  const v = parseFloat(speedRange.value).toFixed(1);
  speedVal.textContent = v;
  SCROLL_SPEED = parseFloat(v); // update immediately, no need to restart
});

// ── Settings toggle ────────────────────────────────────
settingsBtn.addEventListener('click', () => settingsPanel.classList.toggle('open'));

// ── Mode selector ──────────────────────────────────────
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
  });
});
function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === m));
}

// ── Apply ──────────────────────────────────────────────
applyBtn.addEventListener('click', async () => {
  const folderId = folderInput.value.trim();
  const apiKey   = apiKeyInput.value.trim();
  const mins     = parseInt(refreshInput.value) || 5;
  if (!folderId || !apiKey) { setStatus('กรุณากรอกข้อมูลให้ครบ'); return; }

  refreshMinutes   = mins;
  currentFolderId  = folderId;
  currentApiKey    = apiKey;

  const scrollSpeed = parseFloat(speedRange.value);
  SCROLL_SPEED = scrollSpeed;
  localStorage.setItem('gallerySettings',
    JSON.stringify({ folderId, apiKey, mode, refreshMinutes, scrollSpeed }));
  settingsPanel.classList.remove('open');
  setStatus('กำลังโหลดรูปภาพ...');

  await initialLoad(folderId, apiKey);
  startAutoRefresh();
});

// ════════════════════════════════════════
// FETCH HELPERS
// ════════════════════════════════════════
async function driveList(folderId, apiKey) {
  const mimeTypes = ['image/jpeg','image/png','image/gif','image/webp','image/bmp'];
  const mimeQuery = mimeTypes.map(m => `mimeType='${m}'`).join(' or ');
  let all = [], pageToken = '';
  do {
    const url = `https://www.googleapis.com/drive/v3/files?` +
      `q=(${mimeQuery}) and '${folderId}' in parents and trashed=false` +
      `&fields=nextPageToken,files(id,name)&pageSize=100` +
      (pageToken ? `&pageToken=${pageToken}` : '') +
      `&key=${apiKey}`;
    const res = await fetch(url);
    if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message||'API error'); }
    const data = await res.json();
    all = all.concat(data.files || []);
    pageToken = data.nextPageToken || '';
  } while (pageToken);
  return all.map(f => ({ id: f.id, src: `https://drive.google.com/thumbnail?id=${f.id}&sz=w800` }));
}

// ── Initial load (full start) ──────────────────────────
async function initialLoad(folderId, apiKey) {
  try {
    const fetched = await driveList(folderId, apiKey);
    if (!fetched.length) { setStatus('ไม่พบรูปภาพใน Folder นี้'); return; }
    images = fetched;
    setStatus(`โหลดแล้ว ${images.length} รูป`);
    hideStatusAfter(2500);
    startDisplay();
  } catch (e) { setStatus('Error: ' + e.message); }
}

// ════════════════════════════════════════
// AUTO REFRESH — silent, no flicker
// ════════════════════════════════════════
function startAutoRefresh() {
  clearInterval(autoRefreshInterval);
  autoRefreshInterval = setInterval(silentRefresh, refreshMinutes * 60 * 1000);
}

async function silentRefresh() {
  if (!currentFolderId || !currentApiKey) return;
  try {
    const fetched = await driveList(currentFolderId, currentApiKey);
    const existingIds = new Set(images.map(i => i.id));
    const newImgs = fetched.filter(i => !existingIds.has(i.id));

    if (!newImgs.length) return; // nothing changed — do nothing at all

    // Merge new images in
    images = [...images, ...newImgs];

    if (mode === 'grid') injectGridImages(newImgs);
    else injectSlideshowImages(newImgs);

    setStatus(`+${newImgs.length} รูปใหม่ · รวม ${images.length} รูป`);
    hideStatusAfter(3000);
  } catch (_) { /* silent fail — don't disturb display */ }
}

// ════════════════════════════════════════
// START / STOP
// ════════════════════════════════════════
function startDisplay() {
  stopAll();
  if (mode === 'grid') startGrid();
  else startSlideshow();
}

function stopAll() {
  cancelAnimationFrame(gridAnimFrame);
  clearTimeout(slideshowTimer);
  gridView.classList.remove('active');
  slideshowView.classList.remove('active');
  gridTracks.forEach(t => { t.innerHTML = ''; });
  slideshowView.innerHTML = '';
  gridOffset = 0;
  slideshowIdx = 0;
  slideshowImages = [];
}

// ════════════════════════════════════════
// GRID MODE  (2 rows, responsive cards)
// ════════════════════════════════════════
/*
  Each row = track with [SET A][SET B] for seamless looping.
  Row 0 starts at offset 0; Row 1 starts at gridTotalWidth/2 (staggered).
  Both share gridOffset as their "base"; row 1 adds halfOffset.
  Card size is recalculated from window dimensions on start & resize.
*/

function buildGridSet(imgList, cardW, cardH) {
  const frag = document.createDocumentFragment();
  imgList.forEach(img => {
    const wrap = document.createElement('div');
    wrap.className = 'grid-img-wrap';
    wrap.dataset.id = img.id;
    wrap.style.width  = cardW + 'px';
    wrap.style.height = cardH + 'px';
    const el = document.createElement('img');
    el.src = img.src;
    el.onload = () => el.classList.add('loaded');
    el.onerror = () => { wrap.style.opacity = '0'; wrap.style.pointerEvents = 'none'; };
    wrap.appendChild(el);
    frag.appendChild(wrap);
  });
  return frag;
}

function startGrid() {
  const dims = calcCardDims();
  CARD_W = dims.w; CARD_H = dims.h;
  gridView.classList.add('active');
  gridOffset = 0;
  rebuildGridDOM(images);
  animateGrid();
}

function rebuildGridDOM(imgList) {
  const dims = calcCardDims();
  CARD_W = dims.w; CARD_H = dims.h;
  const newSetWidth = imgList.length * (CARD_W + GAP);
  const newOffset   = gridTotalWidth > 0 ? (gridOffset % newSetWidth) : 0;

  gridTracks.forEach((track, rowIdx) => {
    const frag = document.createDocumentFragment();
    frag.appendChild(buildGridSet(imgList, CARD_W, CARD_H)); // set A
    frag.appendChild(buildGridSet(imgList, CARD_W, CARD_H)); // set B
    track.innerHTML = '';
    track.appendChild(frag);
  });

  gridTotalWidth = newSetWidth;
  gridOffset     = newOffset;
  applyTrackTransforms();
}

function applyTrackTransforms() {
  const half = gridTotalWidth / 2;
  const off0 = gridOffset % gridTotalWidth;
  const off1 = (gridOffset + half) % gridTotalWidth;
  gridTracks[0].style.transform = `translateX(${-off0}px)`;
  gridTracks[1].style.transform = `translateX(${-off1}px)`;
}

// Inject new images without rebuilding — append to both sets in both rows
function injectGridImages(newImgs) {
  if (!newImgs.length) return;
  const existingCount = images.length - newImgs.length;
  gridTracks.forEach(track => {
    const fragA = buildGridSet(newImgs, CARD_W, CARD_H);
    const fragB = buildGridSet(newImgs, CARD_W, CARD_H);
    const setBFirst = track.children[existingCount];
    track.insertBefore(fragA, setBFirst);
    track.appendChild(fragB);
  });
  gridTotalWidth = images.length * (CARD_W + GAP);
}

function animateGrid() {
  gridOffset += SCROLL_SPEED;
  if (gridOffset >= gridTotalWidth) gridOffset -= gridTotalWidth;
  applyTrackTransforms();
  gridAnimFrame = requestAnimationFrame(animateGrid);
}

// Rebuild on resize (debounced)
let resizeTimer;
window.addEventListener('resize', () => {
  if (mode !== 'grid' || !gridView.classList.contains('active')) return;
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => rebuildGridDOM(images), 200);
});

// ════════════════════════════════════════
// SLIDESHOW MODE
// ════════════════════════════════════════
function startSlideshow() {
  slideshowView.classList.add('active');
  slideshowImages = shuffle([...images]);
  slideshowIdx = 0;
  advanceSlide();
}

function advanceSlide() {
  const pool = slideshowImages.length ? slideshowImages : images;
  const img = pool[slideshowIdx % pool.length];

  const slide = document.createElement('div');
  slide.className = 'slide';
  const el = document.createElement('img');
  el.src = img.src;
  el.alt = '';
  slide.appendChild(el);
  slideshowView.appendChild(slide);

  requestAnimationFrame(() => requestAnimationFrame(() => slide.classList.add('visible')));

  // Remove old slides (keep latest 2 visible)
  const slides = slideshowView.querySelectorAll('.slide');
  if (slides.length > 2) {
    slides[0].classList.remove('visible');
    setTimeout(() => slides[0].remove(), 1400);
  }

  slideshowTimer = setTimeout(() => {
    slideshowIdx++;
    // When we've cycled through the pool, reshuffle (new images already merged in)
    if (slideshowIdx >= slideshowImages.length) {
      slideshowImages = shuffle([...images]);
      slideshowIdx = 0;
    }
    advanceSlide();
  }, 6000);
}

// New images dropped into the pool; they'll appear naturally on next cycle
function injectSlideshowImages(newImgs) {
  // Insert new images at random positions in the remaining upcoming queue
  for (const img of newImgs) {
    const insertAt = slideshowIdx + 1 +
      Math.floor(Math.random() * (slideshowImages.length - slideshowIdx));
    slideshowImages.splice(insertAt, 0, img);
  }
}

// ── Utilities ──────────────────────────────────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function setStatus(msg) {
  statusEl.textContent = msg;
  statusEl.style.opacity = '1';
}
let statusTimeout;
function hideStatusAfter(ms) {
  clearTimeout(statusTimeout);
  statusTimeout = setTimeout(() => { statusEl.style.opacity = '0'; }, ms);
}

// ── Auto-start ─────────────────────────────────────────
window.addEventListener('load', () => {
  const s = JSON.parse(localStorage.getItem('gallerySettings') || '{}');
  if (s.folderId && s.apiKey) {
    if (s.mode) setMode(s.mode);
    if (s.refreshMinutes) { refreshMinutes = s.refreshMinutes; refreshInput.value = s.refreshMinutes; }
    currentFolderId = s.folderId;
    currentApiKey   = s.apiKey;
    setStatus('กำลังโหลดรูปภาพ...');
    initialLoad(s.folderId, s.apiKey).then(startAutoRefresh);
  } else {
    settingsPanel.classList.add('open');
  }
});
